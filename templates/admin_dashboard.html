{% extends "base.html" %}
{% block content %}

<h2 class="page-title">⚙️ Admin Dashboard</h2>

<div class="row g-4">
    <!-- Moderation Queue -->
    <div class="col-md-6 col-lg-3">
        <a href="{{ url_for('admin.moderation') }}" class="text-decoration-none">
            <div class="glass-card admin-box h-100 text-center p-4 hover-effect">
                <i class="bi bi-shield-check display-4 text-warning mb-3"></i>
                <h3 class="display-6 fw-bold">{{ pending_count }}</h3>
                <p class="text-muted mb-0">Pending Reports</p>
            </div>
        </a>
    </div>

    <!-- Analytics -->
    <div class="col-md-6 col-lg-3">
        <a href="{{ url_for('main.stats') }}" class="text-decoration-none">
            <div class="glass-card admin-box h-100 text-center p-4 hover-effect">
                <i class="bi bi-graph-up display-4 text-info mb-3"></i>
                <h3>View</h3>
                <p class="text-muted mb-0">Analytics & Charts</p>
            </div>
        </a>
    </div>

    <!-- Users -->
    <div class="col-md-6 col-lg-3">
        <div class="glass-card admin-box h-100 text-center p-4">
            <i class="bi bi-people display-4 text-success mb-3"></i>
            <h3 class="display-6 fw-bold">{{ user_count }}</h3>
            <p class="text-muted mb-0">Total Users</p>
        </div>
    </div>
</div>



<style>
    .hover-effect {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .hover-effect:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
</style>

{% endblock %}
