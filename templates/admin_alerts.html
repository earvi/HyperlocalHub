{% extends "base.html" %}
{% block content %}

<h2 class="page-title">📢 User Incident Reports</h2>

<div class="glass-card p-4">
    <table class="table table-dark table-hover align-middle text-center">
        <thead class="table-secondary text-dark">
            <tr>
                <th>ID</th>
                <th>Category</th>
                <th>Title</th>
                <th>Source</th>
                <th>Fetched</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for a in alerts %}
            <tr>
                <td>{{ a.id }}</td>
                <td>{{ a.category }}</td>
                <td class="text-start">{{ a.title }}</td>
                <td>{{ a.source }}</td>
                <td>{{ a.fetched_at.strftime('%Y-%m-%d %H:%M') if a.fetched_at else '' }}</td>
                <td>
                    <form action="{{ url_for('admin.delete_alert', alert_id=a.id) }}" method="post"
                        onsubmit="return confirm('Delete this alert?');">
                        <button class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
