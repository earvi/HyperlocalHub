{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="glass-card p-5" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-2">Welcome Back</h2>
            <p class="text-muted">Sign in to continue</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2" role="alert">
            <i class="bi bi-exclamation-circle me-2"></i> {{ error }}
        </div>
        {% endif %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold text-uppercase">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i
                            class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control border-start-0 ps-0"
                        placeholder="Enter your username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold text-uppercase">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i
                            class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control border-start-0 ps-0"
                        placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100 mb-3">Sign In</button>

            <div class="text-center">
                <small class="text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}"
                        class="text-decoration-none fw-bold">Sign up</a></small>
            </div>
        </form>
    </div>
</div>
{% endblock %}
